version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: njugush-postgres
    environment:
      POSTGRES_USER: njugush
      POSTGRES_PASSWORD: njugush123
      POSTGRES_DB: njugush_pos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U njugush -d njugush_pos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: njugush-backend
    environment:
      DATABASE_URL: postgresql://njugush:njugush123@postgres:5432/njugush_pos?schema=public
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_EXPIRATION: 24h
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate dev && npx prisma db seed && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: njugush-frontend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
